<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Фильмы</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .card:hover {
            transform: scale(1.02);
            transition: 0.3s;
        }
    </style>
</head>

<body class="bg-light">

<!-- 🔝 Navbar -->
<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <span class="navbar-brand mb-0 h1">🎬 Фильмы и отзывы</span>
        <a href="{% url 'add_film' %}" class="btn btn-success">+ Добавить свой отзыв к фильму</a>
    </div>
</nav>

<div class="container mt-5">

    <h2 class="mb-4 text-center">Список фильмов</h2>

    {% if films %}
        <div class="row">
            {% for film in films %}
                <div class="col-md-6 col-lg-4">
                    <div class="card shadow-sm mb-4 h-100">
                        <div class="card-body d-flex flex-column">

                            <h5 class="card-title text-primary">
                                {{ film.title }}
                            </h5>

                            <p class="card-text text-muted">
                                {{ film.description|truncatewords:20 }}
                            </p>

                            <hr>

                            <p><strong>Отзыв:</strong></p>
                            <p class="text-dark">
                                {{ film.review|truncatewords:15 }}
                            </p>

                            <div class="mt-auto">
                                <a href="{% url 'film_detail' film.pk %}" class="btn btn-outline-primary btn-sm w-100">
                                    Подробнее
                                </a>
                            </div>

                        </div>
                    </div>
                </div>
            {% endfor %}
        </div>

    {% else %}
        <!-- 💤 Пустое состояние -->
        <div class="text-center mt-5">
            <h4 class="text-muted">Пока нет фильмов 😢</h4>
            <a href="{% url 'add_film' %}" class="btn btn-primary mt-3">
                Добавить первый фильм
            </a>
        </div>
    {% endif %}

</div>

</body>
</html>
