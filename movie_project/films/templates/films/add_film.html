<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Добавить фильм и отзыв к нему</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container d-flex justify-content-center align-items-center vh-100">

    <div class="card shadow-lg p-4" style="width: 500px;">

        <h3 class="text-center mb-4">🎬 Добавить фильм</h3>

        <form method="post">
            {% csrf_token %}

            <div class="form-floating mb-3">
                {{ form.title }}
                <label>Название фильма</label>
            </div>

            <div class="form-floating mb-3">
                {{ form.description }}
                <label>Описание</label>
            </div>

            <div class="form-floating mb-3">
                {{ form.review }}
                <label>Отзыв</label>
            </div>

            <button type="submit" class="btn btn-primary w-100">
                💾 Сохранить
            </button>

            <a href="{% url 'film_list' %}" class="btn btn-outline-secondary w-100 mt-2">
                ⬅ Назад
            </a>
        </form>

    </div>

</div>

</body>
</html>
